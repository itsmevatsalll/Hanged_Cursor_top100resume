# Methodology Summary

Our system ranks candidates against the job description in two stages. A
pre-computation stage first filters out honeypot/trap entries, extracts
structured features (experience, skills, capabilities, recruiter and
platform-behavior signals), and embeds both the job description and every
candidate resume using BAAI/bge-small-en-v1.5. The time-boxed ranking
stage then combines four signals into a single score: semantic similarity
to the JD, capability-weighted matches derived from the JD's own text,
normalized structured features (experience, career progression, skill
breadth, recruiter responsiveness), and a behavioral score (recency,
availability, notice-period fit). The top 500 candidates are then
re-scored with a deeper, evidence-weighted capability match - favoring
concrete evidence from career history and projects over keyword-stuffed
skills sections - combined with a corporate-pedigree filter that
down-weights candidates whose entire career is at outsourcing/consulting
firms or outside the target engineering domain. The final top 100 are
written to the submission CSV with per-candidate, fact-grounded reasoning
strings explaining what drove their rank.



